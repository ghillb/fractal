name: Evolve Agent

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      SPRITES_ENABLED: ${{ vars.SPRITES_ENABLED || 'false' }}
      SPRITES_DEFAULT_NAME: ${{ vars.SPRITES_DEFAULT_NAME || 'qbuild' }}
      FRACTAL_EVOLVE_GOAL: Become an entity to be ever more capable and be able to contemplate its own existence.
      FRACTAL_MAX_CHANGED_FILES: "8"
      FRACTAL_MAX_CYCLE_SECONDS: "900"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Run evolve cycle
        run: bun run evolve:cycle

      - name: Push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "fractal[bot]"
            git config user.email "fractal-bot@users.noreply.github.com"
            git add -A
            git commit -m "chore: persist evolve cycle output" || true
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "No changes to push"
          fi
