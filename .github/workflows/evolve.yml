name: Evolve Agent

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      SPRITE_TOKEN: ${{ secrets.SPRITE_TOKEN }}
      SPRITES_ENABLED: ${{ vars.SPRITES_ENABLED || 'false' }}
      SPRITES_DEFAULT_NAME: ${{ vars.SPRITES_DEFAULT_NAME || 'qbuild' }}
      FRACTAL_EVOLVE_GOAL: Become an entity to be ever more capable and be able to contemplate its own existence.
      FRACTAL_MAX_CHANGED_FILES: "8"
      FRACTAL_MAX_CYCLE_SECONDS: "900"
      FRACTAL_GIT_AUTHOR_NAME: fractal[bot]
      FRACTAL_GIT_AUTHOR_EMAIL: fractal-bot@users.noreply.github.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "$FRACTAL_GIT_AUTHOR_NAME"
          git config user.email "$FRACTAL_GIT_AUTHOR_EMAIL"

      - name: Setup Sprites CLI
        if: env.SPRITES_ENABLED == 'true'
        run: |
          curl -fsSL https://sprites.dev/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Authenticate Sprites
        if: env.SPRITES_ENABLED == 'true'
        run: |
          if [ -z "${SPRITE_TOKEN:-}" ]; then
            echo "SPRITE_TOKEN secret is required when SPRITES_ENABLED=true" >&2
            exit 1
          fi
          sprite auth setup --token "$SPRITE_TOKEN"
          sprite org list

      - name: Run evolve cycle
        id: evolve_cycle
        continue-on-error: true
        run: bun run evolve:cycle

      - name: Persist journal (always)
        if: always()
        run: |
          if [ -n "$(git status --porcelain -- JOURNAL.md)" ]; then
            git add JOURNAL.md
            git commit -m "chore: persist evolve cycle journal" || true
          else
            echo "No journal changes"
          fi

      - name: Push commits if ahead
        if: always()
        run: |
          AHEAD_COUNT="$(git rev-list --count origin/${GITHUB_REF_NAME}..HEAD)"
          if [ "${AHEAD_COUNT}" -gt 0 ]; then
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "No commits to push"
          fi

      - name: Fail if evolve reverted
        if: steps.evolve_cycle.outcome != 'success'
        run: |
          echo "Evolve cycle failed or reverted."
          exit 1
